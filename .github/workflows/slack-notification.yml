name: Slack Notification

on:
  workflow_run:
    workflows: ["DevOps Pipeline"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "DevOps Pipeline *${{ github.event.workflow_run.conclusion }}* — <${{ github.event.workflow_run.html_url }}|View run>"
            }
